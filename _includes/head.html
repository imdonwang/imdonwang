<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="author"  content="{{ site.author }}">
    <meta name="description" content="{{ site.description }}">
    <meta name="keywords"  content="{{ site.keyword }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | prepend: site.url }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/png" href="{{ "/assets/icons/favicon/favicon-32x32_ca689c3.png" | relative_url }}" sizes="32x32" />
    <link rel="icon" type="image/png" href="{{ "/assets/icons/favicon/favicon-16x16_e1883cf.png" | relative_url }}" sizes="16x16" />
    <link rel="shortcut icon" type="image/x-icon" href="{{ "/assets/icons/favicon/favicon_d87cd2a.ico" | relative_url }}" />
    <link rel="bookmark" type="image/x-icon" href="{{ "/assets/icons/favicon/favicon_d87cd2a.ico" | relative_url }}" />
    <link rel="stylesheet" href="{{ "/assets/css/normalize/8.0.1/normalize.min.css" | relative_url }}">
    <link rel="stylesheet" href="{{ "/assets/fonts/fontawsome/5.15.2/css/pro.min.css" | relative_url }}">
    <link rel="stylesheet" href="{{ "/assets/css/app.min.css" | relative_url }}">
</head>
